<!DOCTYPE html>
<html>
<head>
  <title>WebGPU Canvas Test</title>
  <style>
    body { margin: 0; padding: 20px; background: #222; }
    canvas { border: 4px solid #0f0; display: block; }
    #info { color: white; margin: 10px 0; font-family: monospace; }
  </style>
</head>
<body>
  <div id="info">Testing WebGPU presentation...</div>
  <canvas id="canvas" width="800" height="600"></canvas>
  
  <script type="module">
    const canvas = document.getElementById('canvas');
    const info = document.getElementById('info');
    
    async function test() {
      if (!navigator.gpu) {
        info.textContent = 'WebGPU not supported!';
        return;
      }
      
      const adapter = await navigator.gpu.requestAdapter();
      const device = await adapter.requestDevice();
      const context = canvas.getContext('webgpu');
      const format = navigator.gpu.getPreferredCanvasFormat();
      
      context.configure({
        device: device,
        format: format,
        alphaMode: 'opaque'
      });
      
      info.textContent = `WebGPU initialized! Format: ${format}`;
      
      // Render solid magenta
      const commandEncoder = device.createCommandEncoder();
      const textureView = context.getCurrentTexture().createView();
      
      const passEncoder = commandEncoder.beginRenderPass({
        colorAttachments: [{
          view: textureView,
          clearValue: { r: 1.0, g: 0.0, b: 1.0, a: 1.0 }, // Bright magenta
          loadOp: 'clear',
          storeOp: 'store'
        }]
      });
      
      passEncoder.end();
      device.queue.submit([commandEncoder.finish()]);
      
      info.textContent += ' - Rendered bright magenta!';
    }
    
    test();
  </script>
</body>
</html>
