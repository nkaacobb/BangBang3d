<!DOCTYPE html>
<html>
<head>
  <title>WebGPU Uniforms Test</title>
  <style>
    body { margin: 0; padding: 20px; background: #222; }
    canvas { border: 4px solid #0f0; display: block; }
    #info { color: white; margin: 10px 0; font-family: monospace; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="info">Testing WebGPU with uniforms...</div>
  <canvas id="canvas" width="800" height="600"></canvas>
  
  <script type="module">
    const canvas = document.getElementById('canvas');
    const info = document.getElementById('info');
    
    async function test() {
      if (!navigator.gpu) {
        info.textContent = 'WebGPU not supported!';
        return;
      }
      
      const adapter = await navigator.gpu.requestAdapter();
      const device = await adapter.requestDevice();
      const context = canvas.getContext('webgpu');
      const format = navigator.gpu.getPreferredCanvasFormat();
      
      context.configure({
        device: device,
        format: format,
        alphaMode: 'opaque'
      });
      
      // Create vertex buffer (position + normal + uv) - matching BangBang3D structure
      const vertexData = new Float32Array([
        // x, y, z, nx, ny, nz, u, v
         0.0,  0.5, 0.0,  0, 0, 1,  0.5, 0.0,  // Top
        -0.5, -0.5, 0.0,  0, 0, 1,  0.0, 1.0,  // Bottom left
         0.5, -0.5, 0.0,  0, 0, 1,  1.0, 1.0   // Bottom right
      ]);
      
      const vertexBuffer = device.createBuffer({
        size: vertexData.byteLength,
        usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST,
        mappedAtCreation: true
      });
      new Float32Array(vertexBuffer.getMappedRange()).set(vertexData);
      vertexBuffer.unmap();
      
      // Create dummy uniform buffers (matching our structure)
      const transformData = new Float32Array(32); // 2 mat4x4
      transformData.fill(0);
      // Set identity matrices
      transformData[0] = transformData[5] = transformData[10] = transformData[15] = 1;
      transformData[16] = transformData[21] = transformData[26] = transformData[31] = 1;
      
      const transformBuffer = device.createBuffer({
        size: transformData.byteLength,
        usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
        mappedAtCreation: true
      });
      new Float32Array(transformBuffer.getMappedRange()).set(transformData);
      transformBuffer.unmap();
      
      const materialData = new Float32Array([
        1.0, 0.0, 0.0, 1.0,  // color (red)
        1.0, 0, 0, 0         // opacity + padding
      ]);
      
      const materialBuffer = device.createBuffer({
        size: 32,
        usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
        mappedAtCreation: true
      });
      new Float32Array(materialBuffer.getMappedRange()).set(materialData);
      materialBuffer.unmap();
      
      // Create default texture (1x1 white pixel)
      const textureData = new Uint8Array([255, 255, 255, 255]);
      const texture = device.createTexture({
        size: { width: 1, height: 1 },
        format: 'rgba8unorm',
        usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST
      });
      device.queue.writeTexture(
        { texture: texture },
        textureData,
        { bytesPerRow: 4 },
        { width: 1, height: 1 }
      );
      
      const sampler = device.createSampler({
        magFilter: 'linear',
        minFilter: 'linear'
      });
      
      info.textContent += `\nBuffers created:
- Vertex: ${vertexData.byteLength} bytes
- Transform uniform: ${transformData.byteLength} bytes
- Material uniform: ${materialData.byteLength} bytes`;
      
      // EXACT same shader structure as BasicMaterialShader DEBUG version
      const shaderCode = `
        struct Uniforms {
          modelViewProjection: mat4x4<f32>,
          model: mat4x4<f32>,
        }
        
        struct VertexInput {
          @location(0) position: vec3<f32>,
          @location(1) normal: vec3<f32>,
          @location(2) uv: vec2<f32>,
        }
        
        struct VertexOutput {
          @builtin(position) position: vec4<f32>,
          @location(0) worldPosition: vec3<f32>,
          @location(1) normal: vec3<f32>,
          @location(2) uv: vec2<f32>,
        }
        
        @group(0) @binding(0) var<uniform> uniforms: Uniforms;
        
        @vertex
        fn main(input: VertexInput) -> VertexOutput {
          var output: VertexOutput;
          
          // DEBUG: Place vertices at fixed visible positions - EXACT COPY
          let scale = 0.3;
          output.position = vec4<f32>(input.position.x * scale, input.position.y * scale, 0.5, 1.0);
          output.worldPosition = input.position;
          output.normal = input.normal;
          output.uv = input.uv;
          
          return output;
        }
        
        struct MaterialUniforms {
          color: vec4<f32>,
          opacity: f32,
        }
        
        @group(0) @binding(1) var<uniform> material: MaterialUniforms;
        @group(0) @binding(2) var textureSampler: sampler;
        @group(0) @binding(3) var textureData: texture_2d<f32>;
        
        @fragment
        fn fragmentMain(input: VertexOutput) -> @location(0) vec4<f32> {
          // DEBUG: Output bright green to test geometry rendering - EXACT COPY
          return vec4<f32>(0.0, 1.0, 0.0, 1.0);
        }
      `;
      
      const shaderModule = device.createShaderModule({ code: shaderCode });
      info.textContent += '\nShader compiled successfully';
      
      const bindGroupLayout = device.createBindGroupLayout({
        entries: [
          { binding: 0, visibility: GPUShaderStage.VERTEX, buffer: { type: 'uniform' } },
          { binding: 1, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'uniform' } },
          { binding: 2, visibility: GPUShaderStage.FRAGMENT, sampler: {} },
          { binding: 3, visibility: GPUShaderStage.FRAGMENT, texture: {} }
        ]
      });
      
      const pipelineLayout = device.createPipelineLayout({
        bindGroupLayouts: [bindGroupLayout]
      });
      
      const pipeline = device.createRenderPipeline({
        layout: pipelineLayout,
        vertex: {
          module: shaderModule,
          entryPoint: 'main',
          buffers: [{
            arrayStride: 32, // 3 + 3 + 2 = 8 floats = 32 bytes
            attributes: [
              { shaderLocation: 0, offset: 0, format: 'float32x3' },  // position
              { shaderLocation: 1, offset: 12, format: 'float32x3' }, // normal
              { shaderLocation: 2, offset: 24, format: 'float32x2' }  // uv
            ]
          }]
        },
        fragment: {
          module: shaderModule,
          entryPoint: 'fragmentMain',
          targets: [{ format: format }]
        },
        primitive: {
          topology: 'triangle-list',
          cullMode: 'none'
        }
      });
      
      info.textContent += '\nPipeline created';
      
      const bindGroup = device.createBindGroup({
        layout: bindGroupLayout,
        entries: [
          { binding: 0, resource: { buffer: transformBuffer } },
          { binding: 1, resource: { buffer: materialBuffer } },
          { binding: 2, resource: sampler },
          { binding: 3, resource: texture.createView() }
        ]
      });
      
      info.textContent += '\nBind group created';
      
      // Render
      const commandEncoder = device.createCommandEncoder();
      const textureView = context.getCurrentTexture().createView();
      
      const passEncoder = commandEncoder.beginRenderPass({
        colorAttachments: [{
          view: textureView,
          clearValue: { r: 0.2, g: 0.2, b: 0.3, a: 1.0 },
          loadOp: 'clear',
          storeOp: 'store'
        }]
      });
      
      passEncoder.setPipeline(pipeline);
      passEncoder.setBindGroup(0, bindGroup);
      passEncoder.setVertexBuffer(0, vertexBuffer);
      passEncoder.draw(3);
      passEncoder.end();
      
      device.queue.submit([commandEncoder.finish()]);
      
      info.textContent += '\n\n✓ Render complete - should see GREEN triangle!';
    }
    
    test().catch(e => {
      info.textContent += '\n\nERROR: ' + e.message;
      console.error(e);
    });
  </script>
</body>
</html>
