<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BangBang3D Physics Demo - Bouncing Balls in Glass Cube</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none; /* Prevent default touch behaviors */
    }

    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 5px;
      font-size: 14px;
      line-height: 1.6;
      pointer-events: none;
      user-select: none;
    }

    #info h1 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #4af;
    }

    #info p {
      margin: 5px 0;
      color: #ccc;
    }

    #info .highlight {
      color: #4af;
      font-weight: bold;
    }

    #fps {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px 15px;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      color: #4af;
      pointer-events: none;
    }
    
    #controls {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      padding: 12px;
      border-radius: 5px;
      font-size: 12px;
    }
    
    .backend-btn {
      padding: 6px 12px;
      margin: 2px;
      background: rgba(68, 170, 255, 0.2);
      border: 1px solid rgba(68, 170, 255, 0.4);
      border-radius: 4px;
      color: #ccc;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.2s;
    }
    
    .backend-btn:hover {
      background: rgba(68, 170, 255, 0.3);
      border-color: rgba(68, 170, 255, 0.6);
    }
    
    .backend-btn.active {
      background: rgba(68, 170, 255, 0.5);
      border-color: #4af;
      color: #fff;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="info">
    <h1>🎱 Physics Cube Demo</h1>
    <p><span class="highlight">Left drag:</span> Rotate cube</p>
    <p><span class="highlight">Right drag:</span> Pan cube</p>
    <p><span class="highlight">Wheel:</span> Zoom camera</p>
    <p style="margin-top: 10px; color: #888;">CPU-rendered • Cube-local gravity</p>
  </div>

  <div id="fps">FPS: --</div>
  
  <div id="controls">
    <div style="margin-bottom: 6px; color: #888; font-size: 11px;">Backend:</div>
    <button class="backend-btn" id="cpuBtn">CPU</button>
    <button class="backend-btn" id="gpuBtn">GPU</button>
    <button class="backend-btn" id="autoBtn">Auto</button>
    <div id="backendInfo" style="margin-top: 6px; color: #4af; font-size: 10px;">Backend: --</div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
