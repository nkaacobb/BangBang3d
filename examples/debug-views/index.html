<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BangBang3d - Debug Views Example</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a1a;
      color: #fff;
      overflow: hidden;
    }
    
    #canvas {
      display: block;
      width: 100%;
      height: 100vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    
    #controls {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.85);
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #333;
      min-width: 250px;
      z-index: 1000;
    }
    
    #controls h2 {
      margin: 0 0 15px 0;
      font-size: 18px;
      color: #0f0;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }
    
    .control-group {
      margin-bottom: 20px;
    }
    
    .control-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    
    button {
      padding: 10px 15px;
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    
    button:hover {
      background: #3a3a3a;
      border-color: #666;
    }
    
    button.active {
      background: #0a8a0a;
      border-color: #0f0;
      color: #fff;
      font-weight: bold;
    }
    
    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .slider-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    
    input[type="range"] {
      flex: 1;
      height: 4px;
      background: #2a2a2a;
      border-radius: 2px;
      outline: none;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      width: 14px;
      height: 14px;
      background: #0f0;
      border-radius: 50%;
      cursor: pointer;
    }
    
    .slider-value {
      min-width: 40px;
      text-align: right;
      font-size: 12px;
      color: #0f0;
    }
    
    .info {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0, 150, 0, 0.1);
      border-radius: 4px;
      border: 1px solid #0a8a0a;
    }
    
    .info h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #0f0;
    }
    
    .info p {
      margin: 5px 0;
      font-size: 12px;
      line-height: 1.6;
      color: #aaa;
    }
    
    .info code {
      background: rgba(0, 255, 0, 0.1);
      padding: 2px 6px;
      border-radius: 3px;
      color: #0f0;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="controls">
    <h2>🔍 Debug Views</h2>
    
    <div class="control-group">
      <label>Backend</label>
      <div class="button-group">
        <button id="btnCPU">CPU</button>
        <button id="btnGPU" class="active">GPU</button>
        <button id="btnAuto">Auto</button>
      </div>
    </div>
    
    <div class="control-group">
      <label>Visualization Mode</label>
      <div class="button-group">
        <button id="mode-normals" class="active">Normals</button>
        <button id="mode-depth">Depth</button>
        <button id="mode-uvs">UVs</button>
        <button id="mode-world">World Pos</button>
      </div>
    </div>
    
    <div class="control-group" id="depth-controls" style="display: none;">
      <label>Depth Range</label>
      <div class="slider-group">
        <div class="slider-row">
          <span style="font-size: 11px; color: #666;">Near:</span>
          <input type="range" id="depth-near" min="0.1" max="10" step="0.1" value="1">
          <span class="slider-value" id="depth-near-value">1.0</span>
        </div>
        <div class="slider-row">
          <span style="font-size: 11px; color: #666;">Far:</span>
          <input type="range" id="depth-far" min="10" max="200" step="1" value="100">
          <span class="slider-value" id="depth-far-value">100</span>
        </div>
      </div>
    </div>
    
    <div class="control-group" id="uv-controls" style="display: none;">
      <label>UV Scale</label>
      <div class="slider-row">
        <input type="range" id="uv-scale" min="0.1" max="5" step="0.1" value="1">
        <span class="slider-value" id="uv-scale-value">1.0</span>
      </div>
    </div>
    
    <div class="info">
      <h3>About Debug Views</h3>
      <p><code>Normals</code>: RGB = XYZ normal direction</p>
      <p><code>Depth</code>: White = near, Black = far</p>
      <p><code>UVs</code>: R = U coord, G = V coord</p>
      <p><code>World Pos</code>: RGB = XYZ world position</p>
    </div>
  </div>

  <script type="module">
    import { BangBangRenderer } from '../../src/renderer/BangBangRenderer.js';
    import { Scene } from '../../src/core/Scene.js';
    import { PerspectiveCamera } from '../../src/core/PerspectiveCamera.js';
    import { Mesh } from '../../src/core/Mesh.js';
    import { BoxGeometry } from '../../src/geometry/BoxGeometry.js';
    import { PlaneGeometry } from '../../src/geometry/PlaneGeometry.js';
    import { DebugMaterial } from '../../src/materials/DebugMaterial.js';
    import { OrbitControls } from '../../src/extras/controls/OrbitControls.js';
    import { Stats } from '../../src/extras/utils/Stats.js';

    // Global variables
    let renderer = null;
    let scene = null;
    let camera = null;
    let controls = null;
    let stats = null;
    let cube = null;
    let ground = null;
    let debugMaterial = null;
    let groundMaterial = null;
    let animationId = null;

    // Initialize renderer with specified backend
    async function initRenderer(backendType) {
      // Dispose old renderer if it exists
      if (renderer) {
        if (animationId) {
          cancelAnimationFrame(animationId);
          animationId = null;
        }
        renderer.dispose();
        renderer = null;
      }

      console.log(`Initializing ${backendType} backend...`);

      // Important: Replace the canvas element to clear WebGPU context
      const oldCanvas = document.getElementById('canvas');
      const newCanvas = document.createElement('canvas');
      newCanvas.id = 'canvas';
      oldCanvas.parentNode.replaceChild(newCanvas, oldCanvas);
      
      // Create renderer with specified backend
      renderer = new BangBangRenderer({
        canvas: newCanvas,
        width: window.innerWidth,
        height: window.innerHeight,
        pixelRatio: 0.5, // Lower resolution for better performance
        backend: backendType
      });

      // Wait for initialization
      await renderer.initialize();
      
      console.log('Backend initialized:', renderer.backendType);

      // Recreate controls with new canvas
      if (controls) {
        controls.dispose();
      }
      controls = new OrbitControls(camera, newCanvas);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;

      // Start animation loop
      if (!animationId) {
        animate();
      }
    }

    // Create scene and objects (called once at startup)
    function createScene() {
      // Create scene
      scene = new Scene();

      // Create camera
      camera = new PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.5, 1000);
      camera.position.set(5, 5, 5);
      camera.lookAt(scene.position);

      // Create stats
      stats = new Stats();
      stats.init();

      // Create debug material (starts with normals mode)
      debugMaterial = new DebugMaterial({
        mode: 'normals',
        depthNear: 1.0,
        depthFar: 100.0,
        uvScale: 1.0
      });

      // Create geometries
      const cubeGeometry = new BoxGeometry(2, 2, 2);
      const planeGeometry = new BoxGeometry(10, 0.1, 10); // Thin box for ground

      // Create cube
      cube = new Mesh(cubeGeometry, debugMaterial);
      cube.position.set(0, 1, 0);
      scene.add(cube);

      // Create ground plane
      groundMaterial = debugMaterial.clone();
      groundMaterial.side = 'DoubleSide'; // Render both sides to prevent disappearing
      ground = new Mesh(planeGeometry, groundMaterial);
      ground.position.set(0, -0.05, 0); // Position at ground level
      scene.add(ground);
    }

    // UI Controls
    const modeButtons = {
      normals: document.getElementById('mode-normals'),
      depth: document.getElementById('mode-depth'),
      uvs: document.getElementById('mode-uvs'),
      world: document.getElementById('mode-world')
    };

    const depthControls = document.getElementById('depth-controls');
    const uvControls = document.getElementById('uv-controls');
    const depthNearSlider = document.getElementById('depth-near');
    const depthFarSlider = document.getElementById('depth-far');
    const uvScaleSlider = document.getElementById('uv-scale');
    const depthNearValue = document.getElementById('depth-near-value');
    const depthFarValue = document.getElementById('depth-far-value');
    const uvScaleValue = document.getElementById('uv-scale-value');

    // Set debug mode
    function setDebugMode(mode) {
      debugMaterial.mode = mode;
      
      // Update button states
      Object.values(modeButtons).forEach(btn => btn.classList.remove('active'));
      modeButtons[mode === 'worldPosition' ? 'world' : mode].classList.add('active');
      
      // Show/hide relevant controls
      depthControls.style.display = mode === 'depth' ? 'block' : 'none';
      uvControls.style.display = mode === 'uvs' ? 'block' : 'none';
    }

    // Mode button event listeners
    modeButtons.normals.addEventListener('click', () => setDebugMode('normals'));
    modeButtons.depth.addEventListener('click', () => setDebugMode('depth'));
    modeButtons.uvs.addEventListener('click', () => setDebugMode('uvs'));
    modeButtons.world.addEventListener('click', () => setDebugMode('worldPosition'));

    // Depth slider event listeners
    depthNearSlider.addEventListener('input', (e) => {
      const value = parseFloat(e.target.value);
      debugMaterial.depthNear = value;
      depthNearValue.textContent = value.toFixed(1);
    });

    depthFarSlider.addEventListener('input', (e) => {
      const value = parseFloat(e.target.value);
      debugMaterial.depthFar = value;
      depthFarValue.textContent = value.toFixed(0);
    });

    // UV scale slider event listener
    uvScaleSlider.addEventListener('input', (e) => {
      const value = parseFloat(e.target.value);
      debugMaterial.uvScale = value;
      uvScaleValue.textContent = value.toFixed(1);
    });

    // Animation loop
    function animate() {
      animationId = requestAnimationFrame(animate);
      
      stats.begin();
      
      // Rotate cube
      cube.rotation.y += 0.01;
      cube.rotation.x += 0.005;
      
      // Update controls
      controls.update();
      
      // Render scene
      renderer.render(scene, camera);
      
      stats.end();
    }

    // Handle window resize
    window.addEventListener('resize', () => {
      const width = window.innerWidth;
      const height = window.innerHeight;
      
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      
      renderer.setSize(width, height);
    });

    // Backend selection buttons
    document.getElementById('btnCPU').addEventListener('click', async () => {
      document.querySelectorAll('#controls .button-group button').forEach(b => {
        if (b.id && b.id.startsWith('btn')) b.classList.remove('active');
      });
      document.getElementById('btnCPU').classList.add('active');
      await initRenderer('cpu');
    });

    document.getElementById('btnGPU').addEventListener('click', async () => {
      document.querySelectorAll('#controls .button-group button').forEach(b => {
        if (b.id && b.id.startsWith('btn')) b.classList.remove('active');
      });
      document.getElementById('btnGPU').classList.add('active');
      await initRenderer('gpu');
    });

    document.getElementById('btnAuto').addEventListener('click', async () => {
      document.querySelectorAll('#controls .button-group button').forEach(b => {
        if (b.id && b.id.startsWith('btn')) b.classList.remove('active');
      });
      document.getElementById('btnAuto').classList.add('active');
      await initRenderer('auto');
    });

    // Create scene once at startup
    createScene();
    
    // Initialize with GPU backend by default
    initRenderer('gpu');
    
    console.log('🔍 Debug Views Example');
    console.log('Use mouse to orbit camera');
    console.log('Try different debug visualization modes!');
  </script>
</body>
</html>
